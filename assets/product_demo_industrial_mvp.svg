  <text x="112" y="196" class="section">Visual Inspection</text>
  <text x="112" y="223" class="body">Localized visual anomaly detection with review recommendation</text>

  <g transform="translate(110 246)">
    <rect x="0" y="0" width="460" height="370" rx="22" class="panel"/>
    <text x="24" y="36" class="h3">Original Image</text>
    <rect x="24" y="58" width="412" height="258" rx="18" fill="#f4f7fb" stroke="#e1e9f4"/>
    <line x1="42" y1="285" x2="418" y2="285" stroke="#d9e3ef"/>
    <use href="#industrialPart" x="95" y="86" width="270" height="225"/>
    <text x="24" y="346" class="body">Part A-1842</text>
    <text x="112" y="346" class="small">machining station</text>
  </g>

  <g transform="translate(610 246)">
    <rect x="0" y="0" width="460" height="370" rx="22" class="panel"/>
