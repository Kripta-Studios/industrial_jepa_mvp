  <g transform="translate(1162 580)">
    <rect x="0" y="0" width="646" height="126" rx="18" fill="#fbfdff" stroke="#e6edf7"/>
    <rect x="405" y="14" width="210" height="92" rx="14" fill="#fef3c7" opacity="0.48"/>
    <line x1="405" y1="14" x2="405" y2="106" stroke="#d97706" stroke-width="2.5" stroke-dasharray="6 7"/>
    <rect x="420" y="15" width="160" height="44" rx="13" fill="#fffbeb" stroke="#fde68a"/>
    <text x="436" y="36" class="small amberText">Deviation detected</text>
    <text x="436" y="52" class="tiny amberText">Cycle 140</text>
    <text x="18" y="34" class="tiny">Vibration</text>
    <text x="18" y="74" class="tiny">Spindle Current</text>
    <text x="18" y="111" class="tiny">Temperature</text>
    <path class="blueLine" d="M118 35 C165 25 207 44 247 34 C290 24 327 39 370 42 C407 45 443 65 480 74 C520 83 558 88 612 98"/>
    <path class="greenLine" d="M118 75 C165 71 210 77 255 70 C300 64 335 74 374 77 C422 82 460 91 500 89 C545 87 575 94 612 101"/>
    <path class="amberLine" d="M118 110 C162 107 205 111 248 106 C292 101 331 105 372 107 C420 112 450 119 492 121 C540 122 576 117 612 112"/>
  </g>
  <g transform="translate(1162 724)">
    <rect x="0" y="0" width="188" height="46" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
