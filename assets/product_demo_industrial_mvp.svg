<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="EVOCON Industrial Predictive Quality MVP interface">
  <defs>
    <linearGradient id="pageBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f80ed"/>
      <stop offset="100%" stop-color="#0057b8"/>
    </linearGradient>
    <radialGradient id="metalFace" cx="42%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="42%" stop-color="#cbd5e1"/>
      <stop offset="72%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </radialGradient>
    <linearGradient id="metalEdge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="48%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="heatBlob" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.78"/>
      <stop offset="48%" stop-color="#f59e0b" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="windowShadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="heatBlur">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .card { fill: rgba(255,255,255,.94); stroke: rgba(29,29,31,.10); stroke-width: 1.3; }
      .panel { fill: #fbfbfd; stroke: rgba(29,29,31,.10); stroke-width: 1.2; }
      .title { fill: #1d1d1f; font-size: 27px; font-weight: 700; letter-spacing: -0.35px; }
      .section { fill: #1d1d1f; font-size: 30px; font-weight: 700; letter-spacing: -0.55px; }
      .h3 { fill: #1d1d1f; font-size: 18px; font-weight: 650; letter-spacing: -0.25px; }
      .body { fill: #3a3a3c; font-size: 15px; font-weight: 520; }
      .small { fill: #6e6e73; font-size: 13px; font-weight: 520; }
      .tiny { fill: #8e8e93; font-size: 12px; font-weight: 520; }
      .mono { fill: #1d1d1f; font-size: 16px; font-weight: 650; }
      .metric { fill: #1d1d1f; font-size: 24px; font-weight: 720; }
      .blueText { fill: #0057b8; }
      .greenText { fill: #248a3d; }
      .amberText { fill: #c66a00; }
      .redText { fill: #d70015; }
      .blueLine { fill: none; stroke: #0071e3; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .greenLine { fill: none; stroke: #248a3d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .amberLine { fill: none; stroke: #c66a00; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <symbol id="industrialPart" viewBox="-180 -150 360 300">
      <ellipse cx="0" cy="115" rx="140" ry="32" fill="#0f172a" opacity="0.13"/>
      <circle cx="0" cy="0" r="126" fill="url(#metalEdge)"/>
      <circle cx="-8" cy="-8" r="112" fill="url(#metalFace)" stroke="#e2e8f0" stroke-width="3"/>
      <circle cx="0" cy="0" r="55" fill="#f8fafc" stroke="#64748b" stroke-width="13"/>
      <circle cx="0" cy="0" r="27" fill="#e2e8f0" stroke="#94a3b8" stroke-width="5"/>
      <g fill="#f8fafc" stroke="#64748b" stroke-width="5">
        <circle cx="0" cy="-86" r="16"/>
        <circle cx="74" cy="-43" r="16"/>
        <circle cx="74" cy="43" r="16"/>
        <circle cx="0" cy="86" r="16"/>
        <circle cx="-74" cy="43" r="16"/>
        <circle cx="-74" cy="-43" r="16"/>
      </g>
      <path d="M-106,-12 C-69,-43 -10,-55 37,-40 C77,-28 96,-2 105,20" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.42"/>
      <path d="M-98,62 C-38,88 38,88 98,52" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
      <path d="M-115,-74 L-98,-90 M100,78 L118,60 M-126,16 L-110,6 M88,-99 L106,-84" stroke="#475569" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
    </symbol>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
