  <rect width="1920" height="1080" fill="url(#pageBg)"/>
  <rect x="46" y="40" width="1828" height="1000" rx="34" fill="#ffffff" filter="url(#windowShadow)"/>
  <rect x="46" y="40" width="1828" height="86" rx="34" fill="#fbfdff"/>
  <line x1="46" y1="126" x2="1874" y2="126" stroke="#e8eef7"/>

  <g transform="translate(82 62)">
    <rect x="0" y="-16" width="46" height="46" rx="14" fill="url(#blueGrad)"/>
    <text x="23" y="14" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">EV</text>
    <text x="64" y="0" class="h3">EVOCON Solutions</text>
    <text x="64" y="28" class="body">Industrial Predictive Quality</text>
  </g>
  <text x="520" y="78" class="body" font-weight="650">Plant 01 &#183; Line 02 &#183; Live Analysis</text>
  <g transform="translate(1582 60)">
