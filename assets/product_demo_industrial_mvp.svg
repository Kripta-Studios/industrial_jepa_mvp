    <text x="20" y="91" class="mono">Part A-1837</text>
    <rect x="190" y="79" width="260" height="10" rx="5" fill="#ffedd5"/>
    <rect x="190" y="79" width="211" height="10" rx="5" fill="#f59e0b"/>
    <text x="480" y="91" class="mono">0.81</text>
    <text x="552" y="91" class="body amberText">Review</text>

    <text x="20" y="146" class="mono">Part A-1819</text>
    <rect x="190" y="134" width="260" height="10" rx="5" fill="#dbeafe"/>
    <rect x="190" y="134" width="161" height="10" rx="5" fill="#2563eb"/>
    <text x="480" y="146" class="mono">0.62</text>
    <text x="552" y="146" class="body blueText">Monitor</text>

    <text x="20" y="201" class="mono">Part A-1811</text>
    <rect x="190" y="189" width="260" height="10" rx="5" fill="#dcfce7"/>
    <rect x="190" y="189" width="73" height="10" rx="5" fill="#16a34a"/>
    <text x="480" y="201" class="mono">0.28</text>
    <text x="552" y="201" class="body greenText">Normal</text>
