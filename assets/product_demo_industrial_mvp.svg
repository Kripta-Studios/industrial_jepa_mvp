    <text x="16" y="37" class="mono">0.76</text>
    <rect x="210" y="0" width="188" height="46" rx="15" fill="#fffbeb" stroke="#fde68a"/>
    <text x="226" y="19" class="tiny amberText">Persistence</text>
    <text x="226" y="37" class="mono">8 cycles</text>
    <rect x="420" y="0" width="188" height="46" rx="15" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="436" y="19" class="tiny amberText">Risk Trend</text>
    <text x="436" y="37" class="mono">Rising</text>
  </g>

  <!-- Workflow -->
  <rect x="80" y="810" width="1760" height="170" rx="28" class="card"/>
  <text x="112" y="858" class="section">Local Pilot Workflow</text>
  <text x="112" y="887" class="body">Local workstation pilot</text>
  <text x="112" y="911" class="body">No dedicated infrastructure required</text>

  <g transform="translate(430 848)">
    <rect x="0" y="0" width="214" height="74" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="32" text-anchor="middle" class="h3">Camera / Sensors</text>
    <text x="107" y="55" text-anchor="middle" class="tiny">Images, signals, process data</text>
    <line x1="236" y1="37" x2="304" y2="37" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="330" y="0" width="224" height="74" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="442" y="32" text-anchor="middle" class="h3 blueText">Feature Extraction</text>
    <text x="442" y="55" text-anchor="middle" class="tiny blueText">Visual and sensor patterns</text>
    <line x1="576" y1="37" x2="644" y2="37" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="670" y="0" width="250" height="74" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="795" y="32" text-anchor="middle" class="h3 greenText">Anomaly &amp; Risk Models</text>
    <text x="795" y="55" text-anchor="middle" class="tiny greenText">Scores, heatmaps, trends</text>
    <line x1="942" y1="37" x2="1010" y2="37" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="1036" y="0" width="230" height="74" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1151" y="32" text-anchor="middle" class="h3 amberText">Prioritized Review</text>
    <text x="1151" y="55" text-anchor="middle" class="tiny amberText">Top alerts for inspection</text>
  </g>

  <g transform="translate(112 936)">
    <rect x="0" y="0" width="156" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe"/>
