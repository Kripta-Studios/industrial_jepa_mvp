    <rect x="270" y="0" width="270" height="58" rx="18" fill="#fffbeb" stroke="#fde68a"/>
    <text x="288" y="24" class="small amberText">Status</text>
    <text x="360" y="39" class="metric">Review</text>
    <rect x="575" y="11" width="130" height="36" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
